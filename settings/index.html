<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="md" data-width="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Privex AI settings">
  <meta name="theme-color" content="#0a0a0a">
  <title>Privex AI - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (() => {
      try {
        const themeRaw = localStorage.getItem('privex-theme') || localStorage.getItem('privexai_theme') || 'system';
        const font = localStorage.getItem('privexai_font_size') || 'md';
        const width = localStorage.getItem('privexai_chat_width') || 'normal';
        const resolved = themeRaw === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : themeRaw;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.font = font;
        document.documentElement.dataset.width = width;
      } catch {
        // no-op
      }
    })();
  </script>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="settings-route">
  <div class="settings-overlay" role="presentation">
    <main class="settings-modal" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="settings-handle" aria-hidden="true"></div>
      <header class="settings-modal-header">
        <div class="settings-modal-title">
          <h1>Settings</h1>
          <p>Manage your local preferences and API key.</p>
        </div>
        <a class="icon-btn" href="../index.html" aria-label="Close">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 4l8 8"></path>
            <path d="M12 4l-8 8"></path>
          </svg>
        </a>
      </header>

      <div class="settings-layout">
        <nav class="settings-tabs" aria-label="Settings tabs">
          <button class="settings-tab is-active" type="button" data-tab="keys">
            <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M6.5 9.5l-1 1v2h2l1-1"></path>
              <circle cx="10" cy="6" r="3"></circle>
              <path d="M12.2 8.2l2.3 2.3"></path>
            </svg>
            <span>API Key</span>
          </button>
          <button class="settings-tab" type="button" data-tab="appearance">
            <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2.5 12.5c1.2-2 3.2-4 5.5-5.5 2.4-1.6 4.8-2.3 5.5-1.6.7.7 0 3.1-1.6 5.5-1.5 2.3-3.5 4.3-5.5 5.5-1.5.9-2.8 1.1-3.5.4-.7-.7-.5-2 .4-3.3z"></path>
              <path d="M6.5 9.5l1 1"></path>
            </svg>
            <span>Appearance</span>
          </button>
        </nav>

        <div class="settings-content">
          <section class="settings-panel is-active" data-panel="keys">
            <div class="settings-row">
              <label for="apiKeyInput">API Key</label>
              <input id="apiKeyInput" type="password" placeholder="Paste your API key" autocomplete="off">
            </div>
            <div class="settings-actions">
              <button id="saveApiKeyBtn" class="btn btn-ghost" type="button">Save Key</button>
              <button id="testConnectionBtn" class="btn btn-primary" type="button">Test</button>
              <button id="clearApiKeyBtn" class="btn btn-ghost" type="button">Clear</button>
            </div>
            <p id="apiStatus" class="status-text">Not set</p>
          </section>

          <section class="settings-panel" data-panel="appearance">
            <div class="settings-row">
              <label>Theme</label>
              <div class="theme-cards" role="group" aria-label="Theme">
                <button class="theme-card" type="button" data-theme-choice="system">
                  <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="2" y="3" width="12" height="9" rx="1.5"></rect>
                    <path d="M8 12v2"></path>
                    <path d="M5 14h6"></path>
                  </svg>
                  <span>System</span>
                </button>
                <button class="theme-card" type="button" data-theme-choice="light">
                  <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="8" cy="8" r="3.5"></circle>
                    <path d="M8 1.5v2"></path>
                    <path d="M8 12.5v2"></path>
                    <path d="M1.5 8h2"></path>
                    <path d="M12.5 8h2"></path>
                    <path d="M3 3l1.4 1.4"></path>
                    <path d="M11.6 11.6L13 13"></path>
                    <path d="M13 3l-1.4 1.4"></path>
                    <path d="M4.4 11.6L3 13"></path>
                  </svg>
                  <span>Light</span>
                </button>
                <button class="theme-card" type="button" data-theme-choice="dark">
                  <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 3a6 6 0 1 1-9 9 8 8 0 0 0 9-9z"></path>
                  </svg>
                  <span>Dark</span>
                </button>
              </div>

              <select id="themeSelect" class="sr-only" aria-label="Theme">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
                <option value="system">System</option>
              </select>
            </div>

            <div class="settings-row">
              <label for="fontSelect">Font Size</label>
              <select id="fontSelect">
                <option value="sm">Small</option>
                <option value="md">Normal</option>
                <option value="lg">Large</option>
              </select>
            </div>

            <div class="settings-row">
              <label for="widthSelect">Chat Width</label>
              <select id="widthSelect">
                <option value="compact">Compact</option>
                <option value="normal">Normal</option>
                <option value="wide">Wide</option>
              </select>
            </div>

            <label class="toggle-row" for="timestampsToggle">
              <span>Show timestamps</span>
              <input id="timestampsToggle" type="checkbox">
              <span class="toggle-ui" aria-hidden="true"></span>
            </label>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="../config.js"></script>
  <script type="module" src="./settings.js"></script>
</body>
</html>
