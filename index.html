<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="md" data-width="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Privex AI is a privacy-first local AI chat testing platform.">
  <meta name="theme-color" content="#0b0b0f">
  <title>Privex AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192.png">
</head>
<body>
  <div class="app-bg"></div>

  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="brand-row">
          <img src="assets/logo.svg" alt="Privex AI" class="brand-logo">
          <div>
            <h2>Privex AI</h2>
            <p>Private AI command center</p>
          </div>
        </div>
        <div class="sidebar-stat">
          <span class="stat-dot"></span>
          <div>
            <strong>Local-only mode</strong>
            <p>No server-side chat storage</p>
          </div>
        </div>
        <button id="newChatBtn" class="btn btn-primary full">+ New Chat</button>
      </div>
      <div id="chatList" class="chat-list"></div>
      <div class="sidebar-bottom">
        <button id="sidebarSettingsBtn" class="side-btn">Settings</button>
        <button id="exportBtn" class="side-btn">Export Chats</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuBtn" class="icon-btn" aria-label="Toggle menu">☰</button>
          <h3 id="activeTitle">New Chat</h3>
        </div>
        <div class="topbar-right">
          <button id="installBtn" class="btn btn-ghost hidden">Install</button>
          <button id="settingsBtn" class="btn btn-ghost">Settings</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <footer class="composer-wrap">
        <div class="composer">
          <textarea id="messageInput" rows="1" placeholder="Write a message to Privex AI..." maxlength="32000"></textarea>
          <button id="sendBtn" class="send-btn" aria-label="Send">➤</button>
        </div>
        <div class="composer-meta">
          <span id="chatLockState">Ready to chat</span>
        </div>
      </footer>
    </main>
  </div>

  <div id="offlineBanner" class="offline-banner hidden">You are offline. Cached chat history is still available.</div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
