<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="md" data-width="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Privex AI is a privacy-first local AI chat testing platform.">
  <meta name="theme-color" content="#0a0a0a">
  <title>Privex AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (() => {
      try {
        const themeRaw = localStorage.getItem('privex-theme') || localStorage.getItem('privexai_theme') || 'system';
        const font = localStorage.getItem('privexai_font_size') || 'md';
        const width = localStorage.getItem('privexai_chat_width') || 'normal';
        const resolved = themeRaw === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : themeRaw;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.font = font;
        document.documentElement.dataset.width = width;
      } catch {
        // no-op
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-192.png">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar" aria-label="Sidebar">
      <div class="sidebar-top">
        <div class="brand-header">
          <div class="brand-row">
            <div class="brand-mark" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 28 28" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="14" cy="14" r="12"></circle>
                <path d="M12 19V9h4a3 3 0 0 1 0 6h-4"></path>
              </svg>
            </div>
            <div class="brand-text">
              <div class="brand-name">Privex AI</div>
              <div class="brand-sub">Private AI</div>
            </div>
          </div>
          <div class="status-row" aria-label="Local-only mode">
            <span class="status-dot" aria-hidden="true"></span>
            <span class="status-label">Local only</span>
          </div>
        </div>

        <button id="newChatBtn" class="btn btn-primary full" type="button">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3.5 13.5h2.2L13 6.2 10.8 4 3.5 11.3v2.2z"></path>
            <path d="M9.9 4.9l1.2 1.2"></path>
            <path d="M2.5 2.5h11v11"></path>
          </svg>
          <span>New chat</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Recent</div>
        <div id="chatList" class="chat-list" role="list"></div>
      </div>

      <div class="sidebar-bottom" role="contentinfo">
        <button id="sidebarSettingsBtn" class="side-row" type="button">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="8" r="2.5"></circle>
            <path d="M8 1.8v1.6"></path>
            <path d="M8 12.6v1.6"></path>
            <path d="M1.8 8h1.6"></path>
            <path d="M12.6 8h1.6"></path>
            <path d="M3.2 3.2l1.1 1.1"></path>
            <path d="M11.7 11.7l1.1 1.1"></path>
            <path d="M12.8 3.2l-1.1 1.1"></path>
            <path d="M4.3 11.7l-1.1 1.1"></path>
          </svg>
          <span>Settings</span>
        </button>
        <button id="exportBtn" class="side-row" type="button">
          <svg class="icon" width="16" height="16" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 2v8"></path>
            <path d="M5 7l3 3 3-3"></path>
            <path d="M3 13h10"></path>
          </svg>
          <span>Export Chats</span>
        </button>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>

    <main class="chat-main" aria-label="Chat">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuBtn" class="icon-btn" type="button" aria-label="Toggle menu">
            <svg class="icon" width="20" height="20" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 4h10"></path>
              <path d="M3 8h10"></path>
              <path d="M3 12h10"></path>
            </svg>
          </button>
          <button id="activeTitle" class="title-btn" type="button" aria-label="Conversation title">New Chat</button>
        </div>
        <div class="topbar-right">
          <button id="installBtn" class="btn btn-ghost hidden" type="button">Install</button>
          <button id="settingsBtn" class="btn btn-ghost" type="button">Settings</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <footer class="composer-wrap" aria-label="Message composer">
        <div class="composer-inner">
          <div class="composer">
            <textarea id="messageInput" rows="1" placeholder="Message Privex AI..." maxlength="32000"></textarea>
            <button id="sendBtn" class="send-btn" type="button" aria-label="Send">
              <svg class="icon" width="14" height="14" viewBox="0 0 16 16" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M8 13V3"></path>
                <path d="M4 7l4-4 4 4"></path>
              </svg>
            </button>
          </div>
          <div class="composer-meta">
            <span id="chatLockState" class="composer-disclaimer">Privex AI uses your API key directly. No data leaves your device.</span>
            <span class="composer-shortcut">⌘ Enter to send</span>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <div id="offlineBanner" class="offline-banner hidden">You are offline. Cached chat history is still available.</div>

  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
