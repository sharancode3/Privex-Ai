<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privex AI - Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, sans-serif;
      color: #f1f2ff;
      background:
        radial-gradient(120% 80% at 10% 0%, rgba(112, 104, 255, 0.2), transparent 60%),
        #0b0b0f;
    }
    main {
      width: min(560px, 92vw);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      background: rgba(22, 24, 34, 0.92);
      padding: 24px;
    }
    h1 { margin: 0 0 10px; }
    p { margin: 0; color: #a8adcb; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Privex AI is installed and running in offline mode. Reconnect to test APIs and send new prompts. Your local conversation history remains on this device.</p>
  </main>
</body>
</html>
