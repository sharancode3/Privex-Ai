<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font="md" data-width="normal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Privex AI - Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    (() => {
      try {
        const themeRaw = localStorage.getItem('privex-theme') || localStorage.getItem('privexai_theme') || 'system';
        const font = localStorage.getItem('privexai_font_size') || 'md';
        const width = localStorage.getItem('privexai_chat_width') || 'normal';
        const resolved = themeRaw === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : themeRaw;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.font = font;
        document.documentElement.dataset.width = width;
      } catch {
        // no-op
      }
    })();
  </script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="settings-route">
  <div class="settings-overlay" role="presentation">
    <main class="settings-modal" role="dialog" aria-modal="true" aria-label="Offline">
      <header class="settings-modal-header">
        <div class="settings-modal-title">
          <h1>You are offline</h1>
          <p>Privex AI is running in offline mode. Your local conversation history remains on this device.</p>
        </div>
      </header>
      <div class="settings-content">
        <p class="status-text">Reconnect to test APIs and send new prompts.</p>
      </div>
    </main>
  </div>
</body>
</html>
